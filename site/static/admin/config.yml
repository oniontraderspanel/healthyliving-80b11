backend:
  name: git-gateway
  branch: main

media_folder: "site/static/img"
public_folder: "img"

collections:
  # --- BLOG POSTS ---
  - name: "post"
    label: "Post"
    folder: "site/content/post"
    path: "{{slug}}/index"
    create: true
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Publish Date", name: "date", widget: "datetime"}
      - {label: "Intro Blurb", name: "description", widget: "text"}
      - {label: "Image", name: "image", widget: "image", required: false}
      - {label: "Body", name: "body", widget: "markdown"}

  # --- PAGES (Home, Contact, Products, Values, Supplements) ---
  - name: "pages"
    label: "Pages"
    files:
      # Home Page
      - file: "site/content/_index.md"
        label: "Home Page"
        name: "home"
        fields:
          - {label: Title, name: title, widget: string}
          - {label: Subtitle, name: subtitle, widget: string}
          - {label: Image, name: image, widget: image}
          - {label: "Blurb", name: blurb, widget: object, fields: [
              {label: "Heading", name: "heading", widget: string},
              {label: "Text", name: "text", widget: "text"}]}
          - {label: "Intro", name: intro, widget: object, fields: [
              {label: "Heading", name: "heading", widget: string},
              {label: "Text", name: "text", widget: "text"}]}
          - {label: "Products", name: products, widget: list, fields: [
              {label: "Image", name: "image", widget: "image"},
              {label: "Text", name: "text", widget: "text"}]}
          - {label: "Values", name: "values", widget: "object, fields: [
              {label: "Heading", name: "heading", widget: string},
              {label: "Text", name: "text", widget: "text"}]}
      
      # Contact Page
      - file: "site/content/contact/_index.md"
        label: "Contact Page"
        name: "contact"
        fields:
          - {label: Title, name: title, widget: string}
          - {label: Logo, name: logo, widget: image}
          - {label: Body, name: body, widget: markdown}
          - label: Contact Entries
            name: contact_entries
            widget: list
            fields:
              - label: Heading
                name: heading
                widget: string
              - label: Text
                name: text
                widget: text

      # Values Page
      - file: "site/content/values/_index.md"
        label: "Values Page"
        name: "values"
        fields:
          - {label: Title, name: title, widget: string}
          - {label: Image, name: image, widget: image}
          - label: Values
            name: values
            widget: list
            fields:
              - {label: Heading, name: heading, widget: string}
              - {label: Text, name: text, widget: text}
              - {label: Image, name: imageUrl, widget: image}

      # --- NEW: Supplements Landing Page ---
      - file: "site/content/supplements/_index.md"
        label: "Supplements Landing Page"
        name: "supplements_home"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Hero Image", name: "image", widget: "image"}
          - {label: "Intro", name: "intro", widget: "object", fields: [
              {label: "Heading", name: "heading", widget: "string"},
              {label: "Description", name: "description", widget: "text"}]}
          - {label: "Main Section", name: "main", widget: "object", fields: [
              {label: "Heading", name: "heading", widget: "string"},
              {label: "Description", name: "description", widget: "text"}]}

  # --- NEW: Supplement Reviews Collection (Dynamic Posts) ---
  - name: "supplements"
    label: "Supplement Reviews"
    folder: "site/content/supplements"
    path: "{{slug}}/index"
    create: true
    fields:
      - {label: "Product Name", name: "title", widget: "string"}
      - {label: "Publish Date", name: "date", widget: "datetime"}
      - {label: "Brand", name: "brand", widget: "string"}
      - {label: "Category", name: "category", widget: "select", options: ["Vitamins", "Protein", "Omega-3", "Probiotics", "Herbal", "Minerals"]}
      - {label: "Short Description", name: "description", widget: "text", hint: "One sentence summary for the grid card."}
      - {label: "Featured Image", name: "image", widget: "image", required: false}
      - {label: "Rating (1-5)", name: "rating", widget: "number", min: 1, max: 5, step: 0.5}
      - {label: "Amazon Affiliate Link", name: "affiliate_link", widget: "string", hint: "Paste your full Amazon associate link here"}
      - {label: "Button Text", name: "btn_text", widget: "string", default: "Check Price on Amazon"}
      - {label: "Body (Full Review)", name: "body", widget: "markdown"}

  # --- SITE SETTINGS ---
  - name: "site_settings"
    label: "Site Settings"
    files:
      - file: "site/data/footer.json"
        label: Footer
        name: footer
        fields:
          - {label: Title, name: title, widget: string}
          - {label: Blurb, name: blurb, widget: text}
      - file: "site/hugo.toml"
        label: Hugo Config
        name: config
        editor:
          preview: false
        fields:
          - {label: Site Title for Browser Tab, name: title, widget: string}
          - label: Params
            name: params
            widget: object
            fields:
              - label: Open Graph Image
                name: images
                widget: list
                field: { label: Image, name: image, widget: image }
